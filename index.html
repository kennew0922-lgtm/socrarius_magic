<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photoshop Manual Series</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            color: #eeeeee;
        }

        /* --- ヘッダーエリア（バナー＋ナビをセットで固定） --- */
        .fixed-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        /* バナー本体 */
        .banner {
            width: 100%;
            height: 180px;
            background: url('top1.webp') center/cover no-repeat;
            display: block;
        }

        /* 相互リンクバー（ナビゲーション） */
        .nav-bar {
            background-color: #000000; /* 真っ黒で引き締める */
            display: flex;
            justify-content: flex-end; /* 右寄せ（イメージ図通り） */
            padding: 10px 20px;
            border-bottom: 2px solid #008eb6; /* フォトショカラーのアクセント */
        }

        .nav-bar a {
            color: #ffffff;
            text-decoration: none;
            font-size: 0.9rem;
            padding: 5px 15px;
            border-right: 1px solid #444; /* 区切り線 */
            transition: color 0.3s, background-color 0.3s;
        }

        .nav-bar a:last-child {
            border-right: none;
        }

        .nav-bar a:hover {
            background-color: #333;
            color: #00a8ff;
        }

        /* --- コンテンツエリア（余白を多めに！） --- */
        .container {
            max-width: 900px;
            margin: 0 auto;
            /* バナー(180px) + ナビ(約45px) + 余裕分で250px確保 */
            padding: 250px 20px 40px;
        }

        .title-area {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 5px;
            border-left: 5px solid #008eb6;
            padding: 5px 0 5px 15px;
        }

        .title-area h2 {
            margin: 0;
            font-size: 1.5rem;
            line-height: 1.2;
        }

        /* --- テーブルデザイン（共通） --- */
        table {
            width: 100%;
            border-collapse: collapse;
            background-color: #2b2b2b;
            border-radius: 8px;
            overflow: hidden;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #3d3d3d;
        }

        th {
            background-color: #008eb6;
            color: white;
        }

        /* 画像用クラス（シェイプページで使用） */
        .preview-img {
            max-width: 300px;
            height: auto;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <div class="fixed-header">
        <div class="banner"></div>
        <nav class="nav-bar">
            <a href="index.html">ショートカット</a>
            <a href="shapes.html">シェイプ</a>
            <a href="#">フォント</a>
        </nav>
    </div>

    <div class="container">
        <div class="title-area">
            <h2>A List of Fonts I Find Useful</h2>
        </div>

        <table>
            <thead>
                <tr>
                    <th style="width: 30%;">Shape Name</th>
                    <th style="width: 70%;">Preview</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Noto Sans</td>
                    <td><img src="font1.png" alt="吹き出し" class="preview-img"></td>
                </tr>
                                <tr>
                    <td>Noto Sans ip</td>
                    <td><img src="font2.png" alt="吹き出し" class="preview-img"></td>
                </tr>
                                <tr>
                    <td>MSゴシック 標準</td>
                    <td><img src="font3.png" alt="吹き出し" class="preview-img"></td>
                </tr>
                                <tr>
                    <td>MS明朝 標準</td>
                    <td><img src="font4.png" alt="吹き出し" class="preview-img"></td>
                </tr>
                                <tr>
                    <td>Alex Brush</td>
                    <td><img src="font5.png" alt="吹き出し" class="preview-img"></td>
                </tr>
                </tbody>
        </table>
    </div>

</body>
</html>
